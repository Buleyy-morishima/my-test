        // 翻页逻辑
        let currentIndex = 0;
        const totalQuestions = questions.length;
        const answers = new Array(totalQuestions).fill(null);

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');
        const testArea = document.getElementById('testArea');
        const resultDiv = document.getElementById('result');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');

        function updateProgress() {
            const answeredCount = answers.filter(a => a !== null).length;
            const percent = Math.round((answeredCount / totalQuestions) * 100);
            progressLabel.textContent = `第 ${currentIndex + 1} / ${totalQuestions} 题`;
            progressPercent.textContent = `${percent}%`;
            progressFill.style.width = `${percent}%`;
        }

        function renderQuestion(index) {
            const q = questions[index];
            document.getElementById('questionTitle').textContent = q.question;
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            q.options.forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'currentOption';
                radio.value = opt.type;
                if (answers[index] === opt.type) radio.checked = true;
                radio.addEventListener('change', function() {
                    answers[index] = opt.type;
                    errorMsg.style.display = 'none';
                    updateProgress();
                });
                label.appendChild(radio);
                label.appendChild(document.createTextNode(opt.text));
                optionsContainer.appendChild(label);
            });
            prevBtn.disabled = (index === 0);
            if (index === totalQuestions - 1) {
                nextBtn.textContent = '💕 提交，看看你适合谁';
                nextBtn.className = 'nav-btn primary';
            } else {
                nextBtn.textContent = '下一题 →';
                nextBtn.className = 'nav-btn primary';
            }
            updateProgress();
            errorMsg.style.display = 'none';
        }

        function goToNext() {
            if (answers[currentIndex] === null) {
                errorMsg.style.display = 'block';
                return;
            }
            if (currentIndex === totalQuestions - 1) {
                submitTest();
                return;
            }
            currentIndex++;
            renderQuestion(currentIndex);
        }

        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        }

        function submitTest() {
            if (answers.includes(null)) {
                errorMsg.style.display = 'block';
                return;
            }
            const scores = {};
            answers.forEach(type => {
                scores[type] = (scores[type] || 0) + 1;
            });
            let maxScore = 0;
            let resultType = "灵魂共鸣型";
            for (let t in scores) {
                if (scores[t] > maxScore) {
                    maxScore = scores[t];
                    resultType = t;
                }
            }
            const data = resultData[resultType];
            testArea.classList.add('hidden');
            resultDiv.innerHTML = `
                <div class="result-icon">${data.icon}</div>
                <div class="result-type">${resultType}</div>
                <div class="result-subtitle">${data.subtitle}</div>
                <div class="divider"></div>
                <div class="result-desc">${data.desc}</div>
                <div class="result-detail">${data.detail}</div>
            `;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        nextBtn.addEventListener('click', goToNext);
        prevBtn.addEventListener('click', goToPrev);

        document.addEventListener('keydown', function(e) {
            if (testArea.classList.contains('hidden')) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            }
        });

        renderQuestion(0);
    </script>
