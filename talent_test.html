<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测一测你的天赋类型</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #f2f4fd 0%, #e4e8f9 25%, #f5f6fe 50%, #e8ecfa 75%, #f2f4fd 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            padding: 36px 28px 44px;
            box-shadow: 0 25px 60px rgba(60, 80, 160, 0.1), 0 4px 16px rgba(0,0,0,0.03);
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 {
            text-align: center;
            color: #2c3a5a;
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: #6a7a9a;
            margin-bottom: 28px;
            font-size: 14px;
            font-weight: 400;
        }
        /* 进度条 */
        .progress-section {
            margin-bottom: 24px;
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 14px 16px;
            backdrop-filter: blur(10px);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #5a6a8a;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .progress-bar {
            height: 8px;
            background: #d6e0f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8aa0d0, #6a80b0, #4a6090);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
            box-shadow: 0 0 10px rgba(100, 130, 180, 0.4);
        }
        /* 题目卡片 */
        .question-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 12px 35px rgba(50, 70, 130, 0.07), 0 2px 8px rgba(0,0,0,0.03);
            min-height: 260px;
            animation: fadeSlide 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.7);
            position: relative;
            overflow: hidden;
        }
        .question-card::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(120, 140, 200, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(25px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .q-title {
            font-weight: 700;
            color: #1f2a40;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 13px;
            position: relative;
            z-index: 1;
        }
        label {
            display: flex;
            align-items: flex-start;
            padding: 16px 18px;
            background: #f7f9fd;
            border: 2px solid transparent;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 15px;
            color: #2c3a5a;
        }
        label:hover {
            background: #f0f4fe;
            border-color: #b8c8e0;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(80, 100, 160, 0.06);
        }
        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            min-width: 22px;
            width: 22px;
            height: 22px;
            border: 2px solid #a0b0d0;
            border-radius: 50%;
            margin-right: 14px;
            margin-top: 1px;
            cursor: pointer;
            transition: all 0.25s;
        }
        input[type="radio"]:checked {
            background: #6a80b0;
            border-color: #4a6090;
            box-shadow: inset 0 0 0 5px white, 0 0 0 4px rgba(106, 128, 176, 0.2);
        }
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            gap: 14px;
        }
        .nav-btn {
            padding: 15px 32px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #a0b0d0;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            color: #2c3a5a;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.5px;
        }
        .nav-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.95);
            border-color: #6a80b0;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(60, 80, 140, 0.1);
        }
        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .nav-btn.primary {
            background: #4a6090;
            color: white;
            border-color: #4a6090;
            box-shadow: 0 8px 22px rgba(60, 80, 140, 0.25);
        }
        .nav-btn.primary:hover:not(:disabled) {
            background: #6a80b0;
            border-color: #6a80b0;
            box-shadow: 0 12px 28px rgba(60, 80, 140, 0.35);
        }
        /* 结果区 */
        #result {
            display: none;
            padding: 36px 28px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            margin-top: 28px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(40, 60, 120, 0.1);
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.7);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-icon {
            font-size: 72px;
            margin-bottom: 10px;
        }
        .result-type {
            font-size: 36px;
            font-weight: 700;
            color: #4a6090;
            margin: 14px 0 8px;
            letter-spacing: 2px;
        }
        .result-subtitle {
            font-size: 15px;
            color: #6a7a9a;
            margin-bottom: 20px;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: #8aa0d0;
            margin: 0 auto 26px;
            border-radius: 2px;
            opacity: 0.7;
        }
        .result-desc {
            font-size: 16px;
            line-height: 2;
            text-align: left;
            color: #1f2a40;
            margin: 0;
            padding: 0 4px;
        }
        .result-detail {
            margin-top: 24px;
            background: #f2f4fd;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
            color: #3a4a6a;
        }
        .result-detail span {
            font-weight: 700;
            color: #4a6090;
        }
        .error-message {
            color: #c44;
            text-align: center;
            margin-top: 14px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .test-area.hidden { display: none; }
        @media (max-width: 500px) {
            .container { padding: 24px 18px; border-radius: 28px; }
            h1 { font-size: 24px; }
            .question-card { padding: 24px 18px; }
            .nav-btn { padding: 13px 22px; font-size: 15px; }
            .result-type { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 测一测你的天赋类型</h1>
        <p class="subtitle">20道题 · 基于多元智能理论 · 发现你隐藏的才能</p>

        <div id="testArea" class="test-area">

                    <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                </div>
            </div>
            <div id="questionCard" class="question-card">

                <div class="options" id="optionsContainer"></div>
            </div>
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn" disabled>← 上一题</button>
                <button id="nextBtn" class="nav-btn primary">下一题 →</button>
            </div>
            <p class="error-message" id="errorMsg">请选择一个选项再继续哦～</p>
        </div>
        <div id="result"></div>
    </div>

    <script>

                { text: "C. “有你在就安心，你总能安排得井井有条”", type: "架构师" },
                { text: "D. “你说话很有感染力，大家愿意听你讲”", type: "表达者" }
            ]},

                { text: "D. 灵感通常在动手做的过程中自然涌现", type: "实践家" }
            ]},
            { question: "13. 对于陌生的新领域，你通常？",

            { question: "15. 压力大的时候，最好的解压方式是？",

                { text: "A. 独处，把脑子里的乱麻一根根理清", type: "洞察者" },

              options: [
                { text: "A. 喜欢预判趋势，提前做好准备", type: "洞察者" },

        const resultData = {

        // 翻页逻辑
        let currentIndex = 0;
        const totalQuestions = questions.length;
        const answers = new Array(totalQuestions).fill(null);

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');
        const testArea = document.getElementById('testArea');
        const resultDiv = document.getElementById('result');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');

        function updateProgress() {
            const answeredCount = answers.filter(a => a !== null).length;
            const percent = Math.round((answeredCount / totalQuestions) * 100);
            progressLabel.textContent = `第 ${currentIndex + 1} / ${totalQuestions} 题`;
            progressPercent.textContent = `${percent}%`;
            progressFill.style.width = `${percent}%`;
        }

        function renderQuestion(index) {
            const q = questions[index];
            document.getElementById('questionTitle').textContent = q.question;
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            q.options.forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'currentOption';
                radio.value = opt.type;
                if (answers[index] === opt.type) radio.checked = true;
                radio.addEventListener('change', function() {
                    answers[index] = opt.type;
                    errorMsg.style.display = 'none';
                    updateProgress();
                });
                label.appendChild(radio);
                label.appendChild(document.createTextNode(opt.text));
                optionsContainer.appendChild(label);
            });
            prevBtn.disabled = (index === 0);
            if (index === totalQuestions - 1) {
                nextBtn.textContent = '✨ 提交，发现我的天赋';
                nextBtn.className = 'nav-btn primary';
            } else {
                nextBtn.textContent = '下一题 →';
                nextBtn.className = 'nav-btn primary';
            }
            updateProgress();
            errorMsg.style.display = 'none';
        }

        function goToNext() {
            if (answers[currentIndex] === null) {
                errorMsg.style.display = 'block';
                return;
            }
            if (currentIndex === totalQuestions - 1) {
                submitTest();
                return;
            }
            currentIndex++;
            renderQuestion(currentIndex);
        }

        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        }

        function submitTest() {
            if (answers.includes(null)) {
                errorMsg.style.display = 'block';
                return;
            }
            const scores = {};
            answers.forEach(type => {
                scores[type] = (scores[type] || 0) + 1;
            });
            let maxScore = 0;
            let resultType = "洞察者";
            for (let t in scores) {
                if (scores[t] > maxScore) {
                    maxScore = scores[t];
                    resultType = t;
                }
            }
            const data = resultData[resultType];
            testArea.classList.add('hidden');
            resultDiv.innerHTML = `
                <div class="result-icon">${data.icon}</div>
                <div class="result-type">${resultType}</div>
                <div class="result-subtitle">${data.subtitle}</div>
                <div class="divider"></div>
                <div class="result-desc">${data.desc}</div>
                <div class="result-detail">${data.detail}</div>
            `;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        nextBtn.addEventListener('click', goToNext);
        prevBtn.addEventListener('click', goToPrev);

        document.addEventListener('keydown', function(e) {
            if (testArea.classList.contains('hidden')) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                goToNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                goToPrev();
            }
        });

        renderQuestion(0);
    </script>
