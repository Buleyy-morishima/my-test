<body>

    <script>
        const questions = [
            { question: "1. 周末早晨醒来，你希望窗外的景色是怎样的？", options: [{ text: "A. 静谧的雪山下，晨雾笼罩着针叶林", country: "瑞士" },{ text: "B. 热烈的阳光洒在彩色房子上，远处有海浪声", country: "西班牙" },{ text: "C. 现代高楼与古老神社并存，街道干净有序", country: "日本" },{ text: "D. 一望无际的红枫林，空气清冽通透", country: "加拿大" }] },
            { question: "2. 你理想中的工作状态更接近哪一种？", options: [{ text: "A. 高效紧凑，在竞争中获得成就感", country: "新加坡" },{ text: "B. 创意自由，不拘泥于固定时间地点", country: "意大利" },{ text: "C. 稳定有序，职责分明，下班后就是自己的生活", country: "芬兰" },{ text: "D. 团队协作热烈，充满活力和激情", country: "巴西" }] },
            { question: "3. 和朋友聚会时，你最喜欢哪种氛围？", options: [{ text: "A. 安静地吃饭、深聊，两三人足矣", country: "日本" },{ text: "B. 热闹的酒吧或派对，大家一起跳舞", country: "巴西" },{ text: "C. 户外烧烤、晒太阳，轻松随意", country: "澳大利亚" },{ text: "D. 在有格调的咖啡馆或小酒馆小酌", country: "意大利" }] },

            { question: "5. 你更喜欢什么样的饮食体验？", options: [{ text: "A. 精致小巧的菜肴，注重视觉和季节性", country: "日本" },{ text: "B. 丰富多样的前菜拼盘，搭配红酒", country: "意大利" },{ text: "C. 新鲜捕捞的海鲜，简单原味", country: "澳大利亚" },{ text: "D. 烤肉、火锅等热闹的分享式大餐", country: "巴西" }] },

            { question: "7. 对于“家”的布置，你最看重什么？", options: [{ text: "A. 极简、功能性强，没有任何多余的东西", country: "瑞士" },{ text: "B. 色彩丰富，充满艺术感和手工艺品", country: "意大利" },{ text: "C. 温暖舒适的木质家具，有书香和茶香", country: "日本" },{ text: "D. 有很多绿植，阳光充沛，像个室内花园", country: "新加坡" }] },
            { question: "8. 你在人际关系中最重视什么？", options: [{ text: "A. 礼貌和边界感，不轻易打扰别人", country: "芬兰" },{ text: "B. 热情坦诚，朋友就是家人", country: "巴西" },{ text: "C. 长久稳定的信任，愿意为朋友两肋插刀", country: "韩国" },{ text: "D. 轻松愉快，保持分寸但随时可以约出来", country: "澳大利亚" }] },

            { question: "10. 面对一项新技能或知识，你通常怎么学习？", options: [{ text: "A. 按照体系化的课程，一步步进阶", country: "日本" },{ text: "B. 直接上手实践，边做边学", country: "澳大利亚" },{ text: "C. 加入学习小组，互相激励讨论", country: "韩国" },{ text: "D. 沉浸在安静环境里独自钻研", country: "芬兰" }] },
            { question: "11. 你理想中的城市夜晚是什么样子？", options: [{ text: "A. 霓虹闪烁，24小时不打烊，随时能买到需要的东西", country: "新加坡" },{ text: "B. 人们在广场上散步，街头艺人弹着吉他", country: "意大利" },{ text: "C. 安静安逸，只有便利店和路灯亮着", country: "日本" },{ text: "D. 河岸边聚集着年轻人，放着音乐随性起舞", country: "巴西" }] },

            { question: "15. 你更想居住在哪里？", options: [{ text: "A. 都市中心的高层公寓，享受顶级便利", country: "新加坡" },{ text: "B. 海边小镇的房子，带一个小花园", country: "西班牙" },{ text: "C. 湖畔的木屋，与自然零距离", country: "芬兰" },{ text: "D. 传统街区里的现代住宅，安静又方便", country: "日本" }] },

        const countryData = {
            "日本": { emoji: "🗾", desc: "你骨子里向往一种秩序中的宁静，那种在传统与现代之间优雅平衡的生活。你喜欢细节之美，欣赏克制而深情的温柔。对你来说，最好的日子不是大起大落，而是春天樱花飘落时在便利店买一个饭团，秋天在神社的台阶上听风铃。你重视规则，但不死板；你喜欢独处，也珍惜三两好友的深谈。你向往的城市夜晚是安静而便利的，路灯亮着，便利店温暖地开着，一切井井有条。在工作中你认真负责，按照体系化的步骤精进，不喜欢混乱。人际关系中你外冷内热，需要自己的边界，但一旦认定就会默默守护。你适合一个既尊重个人空间，又有深厚文化底蕴的地方。日本的生活哲学恰好呼应了你对节奏和质感的追求，在那里你可以心安理得地享受独处，也可以在有仪式感的日常里找到小小的幸福。" },
            "意大利": { emoji: "🇮🇹", desc: "你是一个不折不扣的生活艺术家。对你来说，生命的意义不在于抵达终点，而在于每一口咖啡的香气、每一场漫长的午宴。你讨厌急匆匆的早晨，不愿意把工作带回家，更相信灵感和直觉。你喜欢丰富的色彩、古老街道上的手工艺品、傍晚广场上的散步。朋友聚会时，你要的不是喧闹，而是有格调的小酒馆和红酒搭配的谈天。你常常靠直觉做决定，认为逻辑之外还有人情和美的考量。规则对你来说是参考，你可以灵活变通，甚至带着一点狡黠的浪漫。你不喜欢被束缚，渴望一种创意自由的生活，可能是自由职业，或是一个允许你表达自我的环境。意大利正是你灵魂的镜像：那里有不慌不忙的咖啡时间，有充盈着艺术感的街角，也有足够的人情味。你可以花三小时吃一顿午饭，没有人会觉得奇怪，因为享受当下就是你最大的正经事。" },
            "瑞士": { emoji: "🇨🇭", desc: "你追求品质、精准和内心的平静。你并不需要很多观众，湖光山色就是最好的陪伴。你喜欢一切都安排得妥当，在规则之下享受最大的自由。极简、功能性强的环境让你安心，多余的杂物会让你焦虑。你做决定时倾向于权衡利弊，选择最可持续的方案，很少冲动行事。在社交中，你礼貌周到，有恰到好处的距离感，初见可能觉得你高冷，但其实你只是尊重别人的边界，也守护自己的。学习新东西时你习惯体系化地深入，一步一个脚印。你向往的生活是清净而有质感的：窗外的雪山和针叶林、家里的原木家具、安静但高效的工作节奏。你适合一个秩序井然、自然优美的地方，那里没有人会突然打乱你的计划，你可以专注地做自己。瑞士恰好满足你对安全感和精确度的需求，在那里你能像钟表一样从容不迫地运转，同时被纯净的自然治愈。" },
            "西班牙": { emoji: "🇪🇸", desc: "你的灵魂是弗拉门戈的节奏，热情、自由、充满生命力。你讨厌无聊和束缚，相信人生就是一场永不落幕的节日。你喜欢热烈的阳光、彩色的房子、海浪的声音。旅行时你更喜欢说走就走，享受迷路带来的惊喜。规则对你来说是可以绕开的栅栏，你总有自己的做法。做决定时你听从直觉和内心的声音，认为体验比正确更重要。你喜欢的社交是热闹真诚的，朋友就是家人，大家挤在一起跳舞、分享塔帕斯。你喜欢的颜色是浓烈鲜活的，红黄橙让你振奋。你理想的家可能在海边小镇，有一个小花园，每天被阳光唤醒。你常觉得生活应该像一场盛大的庆典，有美酒、音乐和深夜的街头闲聊。西班牙完全懂你：那里的午睡是为了更有精力享受夜晚，那里的节日多到好像每一天都值得庆祝。在那里，你的自由灵魂不会被规训，反而会被赞美。" },

            "芬兰": { emoji: "🇫🇮", desc: "你珍视个人空间，在安静中汲取力量。你不是不爱热闹，只是更享受独处的深度。桑拿、森林、极光是你理想生活的关键词。你外表冷静，内心却有一团温柔的火焰。你理想的工作是稳定有序，职责分明，下班后完全属于自己。你旅行时喜欢独自背包，融入当地人的生活，而不是走马观花。你学习新东西时喜欢一个人安静钻研，不被打扰。你疲惫时的治愈方式是独自在桑拿房里放空，然后勇敢地跳进冰湖——这种冷热交替的极致体验让你觉得活着。在人际关系中你重视礼貌和边界，不轻易打扰别人，也保护自己的空间。芬兰是世界上个人空间最受尊重的地方之一，那里的沉默不是尴尬，而是一种默契。你可以在森林里散步一整天不说一句话，也可以在湖边的小木屋里过上真正自给自足的生活。" },

        const container = document.getElementById('questionsContainer');
        questions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question';
            const optionsHTML = q.options.map(opt => `
                <label>
                    <input type="radio" name="q${idx}" value="${opt.country}" required>
                    ${opt.text}
                </label>
            `).join('');
            div.innerHTML = `<div class="q-title">${q.question}</div><div class="options">${optionsHTML}</div>`;
            container.appendChild(div);
        });

        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const allAnswered = questions.every((_, idx) => document.querySelector(`input[name="q${idx}"]:checked`));
            if (!allAnswered) {
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';

            const scores = {};
            questions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected) {
                    const country = selected.value;
                    scores[country] = (scores[country] || 0) + 1;
                }
            });

            let maxScore = 0;
            let resultCountry = "日本";
            for (let c in scores) {
                if (scores[c] > maxScore) { maxScore = scores[c]; resultCountry = c; }
            }

            const top = Object.entries(scores).filter(([,s]) => s===maxScore).map(([c])=>c);
            if (top.length > 1) resultCountry = top[0];

            const data = countryData[resultCountry];
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="result-emoji">${data.emoji}</div>
                <div class="result-country">${resultCountry}</div>
                <div class="divider"></div>
                <div class="result-desc">${data.desc}</div>
            `;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
