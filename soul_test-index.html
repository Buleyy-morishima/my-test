<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你的人格底色</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ece4f2 0%, #f9f0f5 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 680px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 20px 50px rgba(120, 80, 120, 0.12);
            margin: 20px 0;
        }
        h1 {
            text-align: center;
            color: #4a3a5e;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #7a6b8a;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .question {
            margin-bottom: 24px;
            padding: 22px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }
        .question:hover { transform: translateY(-2px); }
        .q-title {
            font-weight: 700;
            color: #3e2c4f;
            margin-bottom: 16px;
            font-size: 16px;
            line-height: 1.5;
        }
        .options { display: flex; flex-direction: column; gap: 10px; }
        label {
            display: flex;
            align-items: flex-start;
            padding: 14px 16px;
            background: #faf8fc;
            border: 2px solid transparent;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            color: #4a3a5e;
        }
        label:hover { background: #f5f0fa; border-color: #b8a9c9; }
        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            min-width: 20px; width: 20px; height: 20px;
            border: 2px solid #b8a9c9;
            border-radius: 50%;
            margin-right: 12px; margin-top: 2px;
            cursor: pointer; transition: all 0.2s;
        }
        input[type="radio"]:checked {
            background: #9b8aaf;
            border-color: #7a688f;
            box-shadow: inset 0 0 0 5px white, 0 0 0 3px rgba(155,138,175,0.3);
        }
        .submit-btn {
            display: block; width: 100%; padding: 18px; margin: 36px 0 16px;
            background: linear-gradient(135deg, #5e4a6e, #4a3a5e);
            color: white; font-size: 19px; font-weight: bold;
            border: none; border-radius: 16px; cursor: pointer;
            letter-spacing: 2px; transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(74,58,94,0.3);
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, #705a82, #5e4a6e);
            box-shadow: 0 12px 30px rgba(74,58,94,0.4);
            transform: translateY(-2px);
        }
        .submit-btn:active { transform: translateY(0px); }
        #result {
            display: none; padding: 32px 24px; background: white;
            border-radius: 24px; margin-top: 32px; text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-color {
            display: inline-block;
            width: 60px; height: 60px; border-radius: 50%;
            margin-bottom: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .result-name {
            font-size: 34px; font-weight: bold; margin: 12px 0 18px;
        }
        .divider {
            width: 60px; height: 3px; margin: 0 auto 24px;
            border-radius: 2px;
        }
        .result-desc {
            font-size: 16px; line-height: 1.9; text-align: left;
            margin: 0;
        }
        .error-message {
            color: #c44; text-align: center; margin-top: 12px;
            display: none; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 测测你的人格底色</h1>
        <p class="subtitle">20道题 · 照见你性格最深处的颜色</p>
        <form id="testForm">
            <div id="questionsContainer"></div>
            <button type="submit" class="submit-btn">✨ 提交，看见我的底色</button>
            <p class="error-message" id="errorMsg">请回答完所有题目再提交哦～</p>
        </form>
        <div id="result"></div>
    </div>

    <script>
        const questions = [
            { question: "1. 独处时，哪种状态让你最舒服？", options: [{ text: "A. 看书、写日记，整理内心", color: "蔚蓝" },{ text: "B. 沉浸在一个创作或手工里", color: "苔绿" },{ text: "C. 和朋友线上聊天，刷有趣的视频", color: "暖橙" },{ text: "D. 规划未来，列出清晰的目标清单", color: "雾灰" }] },
            { question: "2. 别人对你的第一印象通常是？", options: [{ text: "A. 安静温柔，有点距离感", color: "蔚蓝" },{ text: "B. 安静但有力量，让人安心", color: "苔绿" },{ text: "C. 热情开朗，很容易聊起来", color: "暖橙" },{ text: "D. 理性冷静，值得信赖", color: "雾灰" }] },
            { question: "3. 面对突然的改变，你通常？", options: [{ text: "A. 先感受情绪，慢慢消化", color: "蔚蓝" },{ text: "B. 接受它，并从中找到新的节奏", color: "苔绿" },{ text: "C. 有点兴奋，觉得是新的可能", color: "暖橙" },{ text: "D. 快速分析利弊，调整计划", color: "雾灰" }] },
            { question: "4. 哪种表达爱的方式更像你？", options: [{ text: "A. 写长长的文字，或者默默地陪伴", color: "蔚蓝" },{ text: "B. 用行动照顾对方，做实际的事", color: "苔绿" },{ text: "C. 热情赞美，频繁的拥抱和表达", color: "暖橙" },{ text: "D. 为对方解决问题，规划未来", color: "雾灰" }] },
            { question: "5. 你更欣赏哪种类型的电影/书籍？", options: [{ text: "A. 细腻的情感片，有心理深度", color: "蔚蓝" },{ text: "B. 自然纪录片，或者关于成长的故事", color: "苔绿" },{ text: "C. 轻松喜剧，让人大笑的综艺", color: "暖橙" },{ text: "D. 悬疑推理，考验逻辑的科幻", color: "雾灰" }] },
            { question: "6. 朋友情绪低落时，你倾向于？", options: [{ text: "A. 安静地听，给予情感上的共鸣", color: "蔚蓝" },{ text: "B. 带他出去走走，用自然治愈", color: "苔绿" },{ text: "C. 讲笑话逗他开心，转移注意力", color: "暖橙" },{ text: "D. 帮他分析问题，找到解决办法", color: "雾灰" }] },
            { question: "7. 对于“个人空间”，你的需求是？", options: [{ text: "A. 需要很多独处时间来恢复能量", color: "蔚蓝" },{ text: "B. 需要适度的安静，但也喜欢陪伴", color: "苔绿" },{ text: "C. 不太需要，有人一起才热闹", color: "暖橙" },{ text: "D. 需要物理空间整洁有序即可", color: "雾灰" }] },
            { question: "8. 你更愿意把时间花在？", options: [{ text: "A. 深度思考或感受艺术", color: "蔚蓝" },{ text: "B. 亲手做点什么，比如园艺、烹饪", color: "苔绿" },{ text: "C. 和朋友聚会，体验新鲜事物", color: "暖橙" },{ text: "D. 学习技能，提升效率", color: "雾灰" }] },
            { question: "9. 哪种环境让你灵感最多？", options: [{ text: "A. 安静的咖啡馆角落，或深夜的书房", color: "蔚蓝" },{ text: "B. 森林、海边，有植物和微风的地方", color: "苔绿" },{ text: "C. 热闹的街头，观察人来人往", color: "暖橙" },{ text: "D. 整洁的图书馆或工作室", color: "雾灰" }] },
            { question: "10. 当你和别人意见不同时，你通常？", options: [{ text: "A. 沉默或委婉表达，不想冲突", color: "蔚蓝" },{ text: "B. 冷静沟通，寻找双方都能接受的方案", color: "苔绿" },{ text: "C. 热情说服，相信沟通能解决一切", color: "暖橙" },{ text: "D. 摆出事实和逻辑，坚持对的", color: "雾灰" }] },
            { question: "11. 你理想中的早晨是怎样的？", options: [{ text: "A. 窗外有鸟鸣，慢慢喝一杯茶", color: "蔚蓝" },{ text: "B. 去公园跑个步，呼吸清新空气", color: "苔绿" },{ text: "C. 阳光洒进房间，放一首活力音乐", color: "暖橙" },{ text: "D. 有条不紊地按清单开启一天", color: "雾灰" }] },
            { question: "12. 哪种颜色更接近你的内在气质？", options: [{ text: "A. 深海般的蓝，安静深邃", color: "蔚蓝" },{ text: "B. 雨后青苔的绿，平和有生机", color: "苔绿" },{ text: "C. 日落时分的橙，温暖洋溢", color: "暖橙" },{ text: "D. 晨雾中的灰，理性而包容", color: "雾灰" }] },
            { question: "13. 在团队中，你往往扮演什么角色？", options: [{ text: "A. 安静的观察者，给出深思后的建议", color: "蔚蓝" },{ text: "B. 稳定的支持者，实际推进任务", color: "苔绿" },{ text: "C. 气氛调节者，鼓励大家", color: "暖橙" },{ text: "D. 组织者或决策者，把控方向", color: "雾灰" }] },
            { question: "14. 回忆过去时，你更容易记住？", options: [{ text: "A. 当时的情绪和氛围", color: "蔚蓝" },{ text: "B. 场景里的气味、温度和触感", color: "苔绿" },{ text: "C. 大家一起大笑的瞬间", color: "暖橙" },{ text: "D. 事情的前因后果和关键节点", color: "雾灰" }] },
            { question: "15. 你更渴望获得哪种评价？", options: [{ text: "A. “你真的很懂我”", color: "蔚蓝" },{ text: "B. “有你在很安心”", color: "苔绿" },{ text: "C. “和你在一起好快乐”", color: "暖橙" },{ text: "D. “你做事我放心”", color: "雾灰" }] },
            { question: "16. 哪种自我成长的方式更适合你？", options: [{ text: "A. 心理咨询或写日记，向内探索", color: "蔚蓝" },{ text: "B. 瑜伽、冥想，身体与心灵同步", color: "苔绿" },{ text: "C. 旅行和社交，向外拓展", color: "暖橙" },{ text: "D. 读书上课，系统提升认知", color: "雾灰" }] },
            { question: "17. 你对于“未来”的态度更接近？", options: [{ text: "A. 带着一点诗意的期待，也有一点忧虑", color: "蔚蓝" },{ text: "B. 相信自然会变好，顺势而为", color: "苔绿" },{ text: "C. 充满希望，觉得有很多惊喜等着", color: "暖橙" },{ text: "D. 目标明确，正一步步走过去", color: "雾灰" }] },
            { question: "18. 当你被人误解时，你会？", options: [{ text: "A. 心里难过，但不太想解释", color: "蔚蓝" },{ text: "B. 选择合适的时机，平和说明", color: "苔绿" },{ text: "C. 立刻解释，不想有隔阂", color: "暖橙" },{ text: "D. 列出事实，澄清误解", color: "雾灰" }] },
            { question: "19. 哪种礼物最能打动你？", options: [{ text: "A. 一封手写信，或一本懂你的书", color: "蔚蓝" },{ text: "B. 一盆植物，或亲手做的东西", color: "苔绿" },{ text: "C. 一场安排好的惊喜旅行", color: "暖橙" },{ text: "D. 你正好需要的实用物品", color: "雾灰" }] },
            { question: "20. 用一句话形容你的人生底色？", options: [{ text: "A. “深海静默，却藏有万千情绪”", color: "蔚蓝" },{ text: "B. “像一棵树，安静生长，不争不抢”", color: "苔绿" },{ text: "C. “永远温暖，永远向阳”", color: "暖橙" },{ text: "D. “山间雾霭，冷静而知性”", color: "雾灰" }] }
        ];

        const colorData = {
            "蔚蓝": { color: "#5b7f9e", name: "蔚蓝", desc: "你的人格底色是深邃而温柔的蔚蓝，像黄昏时分的海面，表面平静，深处却涌动着丰富的情感。你是很好的倾听者，拥有一颗共情力极强的内心。你习惯先处理别人的情绪，再处理事情。你不喜欢肤浅的喧闹，渴望灵魂层面的共鸣。有时候你显得有点疏离，但其实是你太珍惜那份内在的秩序。独处对你来说不是孤独，而是一种必要的修复。你像一本需要慢慢品读的书，初看安静，越读越有味道。你的力量在于深度，在一个人人都急于表达的世界里，你依然愿意留出空间去感受、去理解、去等待。请保护好你的敏感，那不是脆弱，而是你独有的天赋。" },
            "苔绿": { color: "#7d9b6e", name: "苔绿", desc: "你的人格底色是沉稳而有生命力的苔绿，像雨后森林里湿润的泥土和覆盖在石头上的青苔。你不争不抢，却始终以自己的节奏生长。你身上有一种让人安心的力量，仿佛在你身边一切都会慢下来，变得稳妥。你喜欢用行动表达关心，做一桌菜、修好一个东西、默默陪伴。你不擅长华丽言辞，但你的存在本身就是一种治愈。你享受自然的疗愈，喜欢植物的安静和动物的单纯。你不太喜欢剧烈的变化，但适应能力很强，总能在变动中找到新的平衡。你像一棵老树，根扎得很深，风雨来了摇一摇，但从不倒下。你的底色提醒你：温柔不代表软弱，安静不代表没有力量。" },
            "暖橙": { color: "#e09f6d", name: "暖橙", desc: "你的人格底色是明亮温暖的暖橙，像日落前最后一抹余晖，温柔地包裹着每一个人。你天生有一种让人放松、愿意靠近的魔力。你的笑声很有感染力，总能轻易让周围变得明亮。你相信沟通能化解一切，拥抱比道理更有用。你热爱生活，喜欢吃好吃的、玩好玩的，觉得人间值得。你有时候会被误解为不够深刻，但其实你只是选择了用乐观去对抗生活的难。你像一团小小的火焰，温暖但不灼人。你的底色在提醒你：你的存在本身就是礼物，你不需要总是燃烧自己去照亮别人，偶尔允许自己也有阴天。" },
            "雾灰": { color: "#a0a8b0", name: "雾灰", desc: "你的人格底色是理性而包容的雾灰，像清晨山间的薄雾，不带任何偏见地笼罩一切。你头脑清晰，善于分析，情绪很少失控。你做决定时依赖事实和逻辑，因此让人觉得可靠。你喜欢一切井然有序，混乱会让你焦虑。你看起来冷静自持，其实内心也有柔软，只是不轻易示人。你像一杯温度刚好的水，不冰不烫，解渴刚好。你追求效率，但并非冷漠；你重视规则，但并非僵化。你的底色赋予你一种独特的成熟感，像城市天际线背后的灰色天空，不抢眼却是所有色彩的背景。请记得，偶尔放下对完美的要求，允许生活有几分朦胧和不确定。你值得被理解，不只是被信赖。" }
        };

        const container = document.getElementById('questionsContainer');
        questions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question';
            const optionsHTML = q.options.map(opt => `
                <label>
                    <input type="radio" name="q${idx}" value="${opt.color}" required>
                    ${opt.text}
                </label>
            `).join('');
            div.innerHTML = `<div class="q-title">${q.question}</div><div class="options">${optionsHTML}</div>`;
            container.appendChild(div);
        });

        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const allAnswered = questions.every((_, idx) => document.querySelector(`input[name="q${idx}"]:checked`));
            if (!allAnswered) {
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';

            const scores = {};
            questions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected) {
                    const color = selected.value;
                    scores[color] = (scores[color] || 0) + 1;
                }
            });

            let maxScore = 0;
            let resultColor = "蔚蓝";
            for (let c in scores) {
                if (scores[c] > maxScore) { maxScore = scores[c]; resultColor = c; }
            }

            const top = Object.entries(scores).filter(([,s]) => s===maxScore).map(([c])=>c);
            if (top.length > 1) resultColor = top[0];

            const data = colorData[resultColor];
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="result-color" style="background: ${data.color};"></div>
                <div class="result-name" style="color: ${data.color};">${data.name}</div>
                <div class="divider" style="background: ${data.color};"></div>
                <div class="result-desc" style="color: #4a3a5e;">${data.desc}</div>
            `;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
